model:
  # Base model — auto-downloaded from HuggingFace on first run (~5 GB, one-time)
  # Set base_gguf_path to a local file path to skip the download.
  base_gguf_path: ""
  base_hf_repo: "unsloth/gemma-4-E4B-it-GGUF"
  base_hf_filename: "gemma-4-E4B-it-Q4_K_M.gguf"

  # LoRA adapter exported from training (the 66 MB file)
  lora_gguf_path: "adapter/minecraft_translator_gemma4_e4b_lora.gguf"
  lora_scale: 1.0

  n_gpu_layers: -1        # -1 = all layers on GPU; 0 = CPU only
  n_ctx: 2048
  max_tokens: 512
  temperature: 0.05
  repeat_penalty: 1.1
  verbose: false

  # Local OpenAI-compatible server backend.
  # setup_windows.bat / setup_unix.sh writes .runtime/backend.json with the
  # concrete server command for this machine.
  server_url: "http://127.0.0.1:8888/v1"
  server_api_key: "llama.cpp"
  server_model: "local-model"
  auto_start_server: true
  server_ready_timeout: 600

  # ── 遠端 OpenAI 相容 API（可選）───────────────────────────────
  # backend_mode: "local" 使用上面的本地 llama.cpp server；
  #               "remote" 改用下列遠端 OpenAI 相容端點（OpenAI / OpenRouter / Groq / 自架 vLLM…）。
  # GUI 會以「模型設定 → 後端模式」的選擇覆寫這裡；CLI 則直接讀這裡。
  # 也可用環境變數覆寫：MODPACK_TRANSLATOR_REMOTE_URL / _API_KEY / _MODEL
  backend_mode: "local"
  remote_base_url: ""      # 例如 https://api.openai.com/v1
  remote_api_key: ""       # 例如 sk-...
  remote_model: ""         # 例如 gpt-4o-mini
